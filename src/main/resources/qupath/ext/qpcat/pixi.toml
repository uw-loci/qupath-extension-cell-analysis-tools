[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

# CUDA hint -- harmless on macOS (ignored by the resolver)
[system-requirements]
cuda = "12"

[dependencies]
python = "3.11.*"
# setuptools provides pkg_resources, which xarray_schema (transitive dep of
# spatialdata -> squidpy) still imports at module load. Modern Pixi envs do
# not preinstall setuptools, so squidpy import fails with
# ModuleNotFoundError: No module named 'pkg_resources' unless we pin it here.
# Cap < 81: setuptools 81 REMOVED the deprecated pkg_resources module, so a
# loose ">=65" now resolves to 81+ and reintroduces the exact import error we
# pinned this to fix. Keep on the 80.x line, which still ships pkg_resources.
setuptools = ">=65,<81"
appose = ">=0.7.2"
numpy = ">=1.24.0,<2.0"
pandas = ">=2.0"
scipy = ">=1.10"
scikit-learn = ">=1.5"
igraph = ">=0.11"
leidenalg = ">=0.10"
umap-learn = ">=0.5.5"
numba = ">=0.59"
matplotlib-base = ">=3.7"
h5py = ">=3.0"
# pyproj via conda-forge (includes PROJ C library; pip build fails on macOS)
pyproj = ">=3.6"
# PyTorch + torchvision via conda-forge for GPU support
# Required for foundation model feature extraction and zero-shot phenotyping
pytorch = ">=2.0.0"
torchvision = ">=0.15.0"
pillow = ">=10.0"

# CUDA steering -- pytorch-gpu steers the resolver to CUDA variants.
# Only exists for linux-64 and win-64 (harmless to list; ignored on macOS).
[target.linux-64.dependencies]
pytorch-gpu = ">=2.0.0"

[target.win-64.dependencies]
pytorch-gpu = ">=2.0.0"

[pypi-dependencies]
scanpy = ">=1.10"
anndata = ">=0.10"
seaborn = ">=0.13"
squidpy = ">=1.4.0"
# harmonypy 2.0.0+ is a pybind11/CMake build with no Windows wheel,
# which forces a source build that requires MSVC nmake on user machines.
# Pin <2 to stay on the pure-Python (py3-none-any) wheel that installs
# everywhere. 0.2.0 has the same run_harmony() entry point we call.
harmonypy = ">=0.2.0,<2"
pybanksy = ">=1.3.4"
scikit-image = ">=0.21"
# Foundation model feature extraction and zero-shot phenotyping
# Inspired by LazySlide (Zheng et al. 2026, Nature Methods)
# Models downloaded on-demand from HuggingFace, not bundled
timm = ">=1.0.3"
open-clip-torch = ">=2.24.0"
huggingface-hub = ">=0.20.0"
# LLM Cluster Explainer [Beta] (v0.2.6+): Anthropic SDK + requests
# (requests is already transitive via huggingface-hub; listed explicitly so
# the Ollama HTTP path works even if the transitive chain changes).
anthropic = ">=0.40.0"
requests = ">=2.31"
