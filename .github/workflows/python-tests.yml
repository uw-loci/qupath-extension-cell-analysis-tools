name: Python script tests

on:
  push:
    paths:
      - "src/main/resources/qupath/ext/qpcat/scripts/**"
      - "python_tests/**"
      - ".github/workflows/python-tests.yml"
  pull_request:
    paths:
      - "src/main/resources/qupath/ext/qpcat/scripts/**"
      - "python_tests/**"
      - ".github/workflows/python-tests.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11" # matches the Appose qupath-qpcat env

      # The scripts are exec'd by Appose, never imported, so tests pull the
      # symbols under test out of the shipped source with `ast`. Only the
      # analysis libraries the assertions touch are installed here -- not the
      # full clustering env.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy pandas

      # harmonypy 0.2.0 is a PyTorch build; install the CPU wheel so the
      # dependency-contract tests actually run instead of skipping. Pinned to
      # the range declared in src/main/resources/qupath/ext/qpcat/pixi.toml.
      - name: Install harmonypy (CPU torch)
        run: |
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install "harmonypy>=0.2.0,<2" scikit-learn

      - name: Run tests
        run: python -m pytest python_tests/ -v

      - name: Byte-compile all Appose scripts
        run: |
          python -m compileall -q src/main/resources/qupath/ext/qpcat/scripts/
